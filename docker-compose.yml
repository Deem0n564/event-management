services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventdb}
      POSTGRES_USER: ${POSTGRES_USER:-event_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-event_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    image: event-management-api:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "${APP_INTERNAL_PORT:-8080}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB:-eventdb}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-event_user}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-event_password}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}"
      SPRING_JPA_SHOW_SQL: "${SPRING_JPA_SHOW_SQL:-false}"
      LOG_LEVEL_APP: "${LOG_LEVEL_APP:-INFO}"
      LOG_LEVEL_SQL: "${LOG_LEVEL_SQL:-WARN}"
      LOG_PATH: /app/logs
    ports:
      - "${APP_PORT:-8080}:${APP_INTERNAL_PORT:-8080}"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:$${PORT:-8080}/actuator/health\" | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  client:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      API_PROXY_TARGET: "http://app:${APP_INTERNAL_PORT:-8080}"
    ports:
      - "${CLIENT_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ | grep -q '<div id=\"root\"></div>'"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
  app_logs:
