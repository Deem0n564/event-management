name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Maven tests
        run: ./mvnw -B -ntp test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build --tag event-management-api:ci .

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - docker
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Set the RENDER_DEPLOY_HOOK_URL repository secret."
            exit 1
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Healthcheck
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "::error::Set the APP_BASE_URL repository variable, for example https://event-management-api.onrender.com."
            exit 1
          fi

          for attempt in {1..60}; do
            if curl -fsS "$APP_BASE_URL/actuator/health" | grep -q '"status":"UP"'; then
              echo "Application healthcheck passed."
              exit 0
            fi

            echo "Waiting for healthy deployment... attempt $attempt/60"
            sleep 10
          done

          echo "::error::Healthcheck failed after waiting for the deployment."
          exit 1
